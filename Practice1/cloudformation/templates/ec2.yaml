AWSTemplateFormatVersion: 2010-09-09
Description: EC2 module - Public and Private EC2 instances

Parameters:
  ProjectName:
    Type: String
  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0df7a207adb9748c7
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of existing EC2 Key Pair
  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
  PublicSGId:
    Type: AWS::EC2::SecurityGroup::Id
  PrivateSGId:
    Type: AWS::EC2::SecurityGroup::Id

Resources:
  PublicEC2:
    Type: AWS::EC2::Instance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ImageId:
        Ref: AmiId
      InstanceType:
        Ref: InstanceType
      KeyName:
        Ref: KeyName
      SubnetId:
        Ref: PublicSubnetId
      SecurityGroupIds:
        - Ref: PublicSGId
      Tags:
        - Key: Name
          Value:
            Fn::Sub: "${ProjectName}-public-ec2"

  PrivateEC2:
    Type: AWS::EC2::Instance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ImageId:
        Ref: AmiId
      InstanceType:
        Ref: InstanceType
      KeyName:
        Ref: KeyName
      SubnetId:
        Ref: PrivateSubnetId
      SecurityGroupIds:
        - Ref: PrivateSGId
      Tags:
        - Key: Name
          Value:
            Fn::Sub: "${ProjectName}-private-ec2"

Outputs:
  PublicEC2Id:
    Value:
      Ref: PublicEC2
  PublicEC2IP:
    Description: Public IP to SSH into
    Value:
      Fn::GetAtt:
        - PublicEC2
        - PublicIp
  PrivateEC2Id:
    Value:
      Ref: PrivateEC2
  PrivateEC2IP:
    Value:
      Fn::GetAtt:
        - PrivateEC2
        - PrivateIp